<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subskrybuj - Aurelia Iwanow</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            background-size: cover;
            background-position: center;
            color: #fff;
        }

        /* Responsywne tło dla subskrypcji */
        @media (min-width: 1025px) { body { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('zdjecie3.png'); } }
        @media (max-width: 1024px) { body { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('zdjecie2.png'); } }

        .form-container {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            padding: 50px;
            border: 1px solid #fbbc05;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h2 { font-weight: 900; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; color: #fbbc05; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #fbbc05;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        button:hover { background: #fff; }
        
        .back-link { display: block; margin-top: 20px; color: #777; text-decoration: none; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Dołącz do newslettera</h2>
        <form>
            <input type="text" placeholder="IMIĘ" required>
            <input type="email" placeholder="EMAIL" required>
            <button type="submit">Zapisz się</button>
        </form>
        <a href="index.html" class="back-link">← powrót</a>
    </div>
</body>
</html>
