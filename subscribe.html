
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subskrybuj - Aurelia Iwanow</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: sans-serif;
            background-size: cover;
            background-position: center;
        }

        /* Different backgrounds for desktop/mobile */
        @media (min-width: 1025px) { body { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('zdjecie3.png'); } }
        @media (max-width: 1024px) { body { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('zdjecie2.png'); } }

        .form-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #fbbc05;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h2 { color: #fbbc05; margin-bottom: 25px; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #fbbc05;
            color: #000;
            border: none;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Dołącz do społeczności</h2>
        <input type="text" placeholder="Twoje imię" required>
        <input type="email" placeholder="Twój e-mail" required>
        <button type="submit">Zapisz się</button>
    </div>
</body>
</html>
