
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia Iwanow - Biohacking</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            background-color: #000;
        }

        /* Responsive Backgrounds */
        .hero {
            height: 100vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Desktop Version (Image 3) */
        @media (min-width: 1025px) {
            .hero {
                background-image: url('zdjecie3.png'); /* Zmień nazwę na właściwą */
            }
        }

        /* Tablet & Mobile Version (Image 2) */
        @media (max-width: 1024px) {
            .hero {
                background-image: url('zdjecie2.png'); /* Zmień nazwę na właściwą */
                background-position: center top;
            }
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            z-index: 100;
        }

        .logo {
            color: #fff;
            text-decoration: none;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .sub-btn {
            background-color: #fbbc05;
            color: #000;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            font-size: 14px;
        }

        .hamburger {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: #fbbc05;
        }

        /* Menu Overlay */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .menu-overlay.active {
            right: 0;
        }

        .menu-overlay a {
            color: #fff;
            text-decoration: none;
            font-size: 2rem;
            text-transform: uppercase;
        }

        .close-menu {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #fbbc05;
            font-size: 3rem;
            cursor: pointer;
        }

        /* Main Content Titles */
        .main-titles {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding-bottom: 50px;
        }

        .main-titles h1 {
            font-size: clamp(4rem, 15vw, 10rem);
            margin: 0;
            font-weight: 900;
            letter-spacing: -2px;
            opacity: 0.9;
        }

        .main-titles p {
            font-size: clamp(1rem, 3vw, 1.8rem);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: -10px;
        }

        /* Bottom Info Bar */
        .info-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }

        .roles {
            display: flex;
            gap: 40px;
        }

        .role-item {
            display: flex;
            flex-direction: column;
        }

        .role-label { color: #888; font-size: 12px; }
        .role-value { font-weight: bold; }

        .socials {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .socials img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        /* Specific styles for desktop vs mobile layout per Image 1 & 4 */
        @media (max-width: 768px) {
            .info-bar {
                flex-direction: column;
                gap: 20px;
                text-align: center;
                padding: 15px;
            }
            .roles { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .socials { font-size: 14px; }
        }

    </style>
</head>
<body>

    <div class="menu-overlay" id="sideMenu">
        <span class="close-menu" onclick="toggleMenu()">&times;</span>
        <a href="#podcast" onclick="toggleMenu()">Podcast</a>
        <a href="#o-mnie" onclick="toggleMenu()">O mnie</a>
        <a href="#kontakt" onclick="toggleMenu()">Kontakt</a>
    </div>

    <div class="hero">
        <nav>
            <a href="index.html" class="logo">Aurelia Iwanow</a>
            <div class="nav-actions">
                <a href="subscribe.html" class="sub-btn">Subskrybuj</a>
                <div class="hamburger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>

        <div class="main-titles">
            <h1>BIOHACKING</h1>
            <p>Optymalizacja ciała i umysłu</p>
        </div>

        <div class="info-bar">
            <div class="roles">
                <div class="role-item">
                    <span class="role-label">Studentka</span>
                    <span class="role-value" style="color: #40e0d0;">Nutrygenomiki</span>
                </div>
                <div class="role-item">
                    <span class="role-value" style="color: #fbbc05; padding-top: 15px;">Dietetyk</span>
                </div>
                <div class="role-item">
                    <span class="role-label">Entuzjastka</span>
                    <span class="role-value" style="color: #ff4d4d;">Psychologii</span>
                </div>
            </div>

            <div class="socials">
                <span>Podcast na</span>
                <a href="https://youtube.com/@aureliaiwanowpodcast?si=F8OPBfGyuJC3FWCP" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YT">
                </a>
                <span>&</span>
                <a href="#" target="_blank"> <!-- SPOTIFY LINK LATER -->
                    <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" alt="Spotify">
                </a>
                <a href="https://www.instagram.com/aureliaiwanow?igsh=MXJmN2xlbG91ZW56dA==" target="_blank" style="margin-left: 10px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="IG">
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }
    </script>
</body>
</html>
