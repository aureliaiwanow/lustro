<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia Iwanow - Biohacking</title>
    <!-- Font Awesome dla ikon social media (jeśli będą potrzebne poza grafiką) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-yellow: #FFB800;
            --bg-dark: #000;
            --text-white: #fff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* GŁÓWNA KONTENER - DOMYŚLNIE DESKTOP */
        .hero-section {
            width: 100%;
            height: 100vh;
            background-image: url('desktop-bg.png'); /* Tutaj wstawiasz 'image_2.png' */
            background-size: cover;
            background-position: center top; /* Pozycjonowanie, aby miasto było widoczne */
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            position: relative;
            z-index: 10; /* Nad grafiką portretu */
        }

        .logo {
            font-family: 'Brush Script MT', cursive; /* Styl zbliżony do podpisu */
            font-size: 32px;
            text-decoration: none;
            color: var(--text-white);
            cursor: pointer;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .btn-subscribe {
            background-color: var(--primary-yellow);
            color: black;
            padding: 12px 24px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            border-radius: 2px;
        }

        .hamburger {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .hamburger span {
            display: block;
            width: 35px;
            height: 4px;
            background-color: var(--primary-yellow);
        }

        /* MENU ROZWIJANE */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100%;
            background-color: rgba(0,0,0,0.98);
            transition: 0.4s ease-out;
            z-index: 1000;
            padding: 60px 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .mobile-menu.active {
            right: 0;
        }

        .mobile-menu .close-btn {
            align-self: flex-end;
            color: var(--primary-yellow);
            text-decoration: none;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .mobile-menu a {
            color: var(--text-white);
            text-decoration: none;
            font-size: 22px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            transition: color 0.2s;
        }

        .mobile-menu a:hover {
            color: var(--primary-yellow);
        }

        /* === TREŚĆ DESKTOP (KODOWANA) === */
        .desktop-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 5;
        }

        .desktop-content h1 {
            font-size: 120px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 15px;
            margin: 0;
            line-height: 1;
            color: rgba(255, 255, 255, 0.9);
        }

        .desktop-content p.subtitle {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 2px;
            margin: 10px 0 0 0;
        }

        /* PASEK DOLNY DESKTOP */
        .desktop-bottom-bar {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .info-grid {
            display: flex;
            gap: 60px;
            text-align: left;
        }

        .info-item {
            font-size: 18px;
            line-height: 1.4;
        }

        .info-item .title {
            color: #aaa;
            display: block;
        }

        .info-item .value {
            font-weight: bold;
        }

        .info-item .value.nutri { color: #00F0FF; }
        .info-item .value.diet { color: var(--primary-yellow); }
        .info-item .value.psych { color: #FF4F81; }

        .podcast-social {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 20px;
        }

        .podcast-social .label {
            color: var(--primary-yellow);
            margin-right: 10px;
        }

        .social-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .social-icons a {
            color: var(--text-white);
            text-decoration: none;
            font-size: 28px;
            transition: opacity 0.2s;
        }

        .social-icons a:hover {
            opacity: 0.8;
        }

        /* Element ukrywający kodowaną treść na mobile */
        .mobile-overlay-graphic {
            display: none;
        }

        /* ========================================= */
        /* === WERSJA MOBILE (PONIŻEJ 768px) === */
        /* ========================================= */
        @media (max-width: 768px) {
            .hero-section {
                /* Używamy ZDJĘCIA Z GRAFIKĄ (image_3.png) */
                background-image: url('mobile-bg.png'); 
                background-position: center center;
                background-size: cover;
            }

            header {
                padding: 15px 20px;
            }

            .logo {
                font-size: 24px;
            }

            .nav-right {
                gap: 15px;
            }

            .btn-subscribe {
                padding: 8px 16px;
                font-size: 14px;
            }

            .hamburger span {
                width: 28px;
                height: 3px;
                gap: 5px;
            }

            /* Ukrywamy kodowaną treść desktopową */
            .desktop-content,
            .desktop-bottom-bar {
                display: none !none !important;
            }

            /* Tworzymy przezroczystą nakładkę, aby kliknięcia w ikony na grafice działały */
            .mobile-overlay-graphic {
                display: block;
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 30vh; /* Wysokość strefy ikon na dole grafiki */
                z-index: 5;
                /* background: rgba(255,0,0,0.3); // Odkomentuj, aby zobaczyć strefę trafienia */
            }

            /* Mapowanie linków na grafice mobilnej (wymaga precyzji) */
            .mobile-link-area {
                position: absolute;
                display: block;
                /* background: rgba(0,255,0,0.3); // Odkomentuj, aby dostosować pozycję */
            }

            /* Przykład pozycjonowania ikon na dole grafiki (image_3.png) */
            .mobile-link-yt {
                bottom: 8%; left: 33%;
                width: 10%; height: 10%;
            }
            .mobile-link-spotify {
                bottom: 8%; left: 45%;
                width: 10%; height: 10%;
            }
            .mobile-link-insta {
                bottom: 8%; left: 80%;
                width: 10%; height: 10%;
            }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <header>
            <a href="https://aureliaiwanow.pl" class="logo">Aurelia Iwanow</a>
            <div class="nav-right">
                <a href="#" class="btn-subscribe" onclick="goToSubscribe()">SUBSKRYBUJ</a>
                <div class="hamburger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </header>

        <!-- === TREŚĆ DESKTOP (Kodowana) === -->
        <div class="desktop-content">
            <h1>BIOHACKING</h1>
            <p class="subtitle">Optymalizacja ciała i umysłu</p>
        </div>

        <nav class="mobile-menu" id="sideMenu">
            <a href="#" class="close-btn" onclick="toggleMenu()">&times;</a>
            <a href="#">Podcast</a>
            <a href="#">O mnie</a>
            <a href="#">Kontakt</a>
        </nav>

        <!-- PASEK DOLNY DESKTOP (Kodowany) -->
        <footer class="desktop-bottom-bar">
            <div class="info-grid">
                <div class="info-item">
                    <span class="title">Studentka</span>
                    <span class="value nutri">Nutrigenomiki</span>
                </div>
                <div class="info-item">
                    <br>
                    <span class="value diet">Dietetyk</span>
                </div>
                <div class="info-item">
                    <span class="title">Entuzjastka</span>
                    <span class="value psych">Psychologii</span>
                </div>
            </div>
            
            <div class="podcast-social">
                <span class="label">Podcast na</span>
                <div class="social-icons">
                    <a href="LINK_DO_SPOTIFY" target="_blank"><i class="fab fa-spotify"></i></a>
                    <a href="https://youtube.com/@aureliaiwanowpodcast?si=F8OPBfGyuJC3FWCP" target="_blank"><i class="fab fa-youtube"></i></a>
                    <a href="https://www.instagram.com/aureliaiwanow?igsh=MXJmN2xlbG91ZW56dA==" target="_blank"><i class="fab fa-instagram"></i></a>
                    <span>&</span>
                    <a href="https://www.instagram.com/aureliaiwanow?igsh=MXJmN2xlbG91ZW56dA==" target="_blank" style="font-size: 20px;">aureliaiwanow</a>
                </div>
            </div>
        </footer>

        <!-- === NAKŁADKA DLA MOBILE (Dla linków na grafice) === -->
        <div class="mobile-overlay-graphic">
            <!-- Puste linki pozycjonowane nad ikonami na grafice -->
            <a href="https://youtube.com/@aureliaiwanowpodcast?si=F8OPBfGyuJC3FWCP" target="_blank" class="mobile-link-area mobile-link-yt" title="YouTube"></a>
            <a href="LINK_DO_SPOTIFY" target="_blank" class="mobile-link-area mobile-link-spotify" title="Spotify"></a>
            <a href="https://www.instagram.com/aureliaiwanow?igsh=MXJmN2xlbG91ZW56dA==" target="_blank" class="mobile-link-area mobile-link-insta" title="Instagram"></a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        function goToSubscribe() {
            // Tutaj w przyszłości podepniemy Twój moduł zbierania maili
            alert("Przekierowanie do strony zapisu (w budowie)");
            // window.location.href = "link_do_formularza.html";
        }
    </script>

</body>
</html>
