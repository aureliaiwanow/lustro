<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurelia Iwanow - Biohacking</title>
    <!-- Font Awesome dla ikon social media (jeśli będą potrzebne poza grafiką) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
        --primary-yellow: #FFB800;
        --bg-dark: #000;
    }

    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: 'Arial', sans-serif;
        background-color: var(--bg-dark);
        color: white;
        overflow-x: hidden;
    }

    /* TŁO GŁÓWNE */
    .hero-section {
        width: 100%;
        height: 100vh;
        background-image: url('desktop-bg.png'); /* Twoje czyste zdjęcie 2 */
        background-size: cover;
        background-position: center top;
        position: relative;
        display: flex;
        flex-direction: column;
    }

    /* HEADER */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        z-index: 100;
    }

    .logo {
        font-family: 'Brush Script MT', cursive;
        font-size: 28px;
        text-decoration: none;
        color: white;
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .btn-subscribe {
        background-color: var(--primary-yellow);
        color: black;
        padding: 10px 20px;
        border: none;
        font-weight: bold;
        text-decoration: none;
        font-size: 14px;
    }

    .hamburger {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .hamburger span {
        display: block;
        width: 30px;
        height: 3px;
        background-color: var(--primary-yellow);
    }

    /* UKŁAD DESKTOP (NAPISY) */
    .desktop-only-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .desktop-only-content h1 {
        font-size: 100px;
        margin: 0;
        letter-spacing: 10px;
        font-weight: 900;
    }

    .desktop-only-content p {
        font-size: 30px;
        margin-top: 10px;
    }

    /* STOPKA DESKTOP */
    .desktop-footer {
        background: rgba(0,0,0,0.7);
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* WERSJA MOBILE */
    @media (max-width: 768px) {
        .hero-section {
            background-image: url('mobile-bg.png') !important; /* Twoje zdjęcie z grafiką */
            background-position: center center;
        }

        /* KLUCZOWE: Ukrywamy wszystkie napisy generowane kodem, 
           bo są już "wtopione" w Twoje zdjęcie */
        .desktop-only-content, 
        .desktop-footer {
            display: none !important;
        }

        /* Przezroczysta strefa na dole dla linków social media na grafice */
        .mobile-social-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 30px;
            z-index: 50;
        }

        .mobile-social-overlay a {
            width: 50px;
            height: 50px;
            margin: 0 10px;
            /* background: rgba(255,255,255,0.1); // Odkomentuj, żeby widzieć gdzie klikać przy testach */
        }
    }

    /* MENU BOCZNE */
    .mobile-menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 250px;
        height: 100%;
        background: black;
        transition: 0.3s;
        z-index: 1000;
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .mobile-menu.active { right: 0; }
    .mobile-menu a { color: white; text-decoration: none; font-size: 20px; border-bottom: 1px dotted #444; padding-bottom: 10px; }
</style>
</head>
<body>

    <div class="hero-section">
        <header>
            <a href="https://aureliaiwanow.pl" class="logo">Aurelia Iwanow</a>
            <div class="nav-right">
                <a href="#" class="btn-subscribe" onclick="goToSubscribe()">SUBSKRYBUJ</a>
                <div class="hamburger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </header>

        <!-- === TREŚĆ DESKTOP (Kodowana) === -->
        <div class="desktop-content">
            <h1>BIOHACKING</h1>
            <p class="subtitle">Optymalizacja ciała i umysłu</p>
        </div>

        <nav class="mobile-menu" id="sideMenu">
            <a href="#" class="close-btn" onclick="toggleMenu()">&times;</a>
            <a href="#">Podcast</a>
            <a href="#">O mnie</a>
            <a href="#">Kontakt</a>
        </nav>

        <!-- PASEK DOLNY DESKTOP (Kodowany) -->
        <footer class="desktop-bottom-bar">
            <div class="info-grid">
                <div class="info-item">
                    <span class="title">Studentka</span>
                    <span class="value nutri">Nutrigenomiki</span>
                </div>
                <div class="info-item">
                    <br>
                    <span class="value diet">Dietetyk</span>
                </div>
                <div class="info-item">
                    <span class="title">Entuzjastka</span>
                    <span class="value psych">Psychologii</span>
                </div>
            </div>
            
            <div class="podcast-social">
                <span class="label">Podcast na</span>
                <div class="social-icons">
                    <a href="LINK_DO_SPOTIFY" target="_blank"><i class="fab fa-spotify"></i></a>
                    <a href="https://youtube.com/@aureliaiwanowpodcast?si=F8OPBfGyuJC3FWCP" target="_blank"><i class="fab fa-youtube"></i></a>
                    <a href="https://www.instagram.com/aureliaiwanow?igsh=MXJmN2xlbG91ZW56dA==" target="_blank"><i class="fab fa-instagram"></i></a>
                    <span>&</span>
                    <a href="https://www.instagram.com/aureliaiwanow?igsh=MXJmN2xlbG91ZW56dA==" target="_blank" style="font-size: 20px;">aureliaiwanow</a>
                </div>
            </div>
        </footer>

        <!-- === NAKŁADKA DLA MOBILE (Dla linków na grafice) === -->
        <div class="mobile-overlay-graphic">
            <!-- Puste linki pozycjonowane nad ikonami na grafice -->
            <a href="https://youtube.com/@aureliaiwanowpodcast?si=F8OPBfGyuJC3FWCP" target="_blank" class="mobile-link-area mobile-link-yt" title="YouTube"></a>
            <a href="LINK_DO_SPOTIFY" target="_blank" class="mobile-link-area mobile-link-spotify" title="Spotify"></a>
            <a href="https://www.instagram.com/aureliaiwanow?igsh=MXJmN2xlbG91ZW56dA==" target="_blank" class="mobile-link-area mobile-link-insta" title="Instagram"></a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        function goToSubscribe() {

    </script>

</body>
</html>
