<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kontakt – Aurelia Iwanow</title>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Reenie+Beanie&family=Barlow+Condensed:wght@300;400;700;900&family=Barlow:wght@300;400;500&family=Montserrat:wght@100;300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;overflow-x:hidden}
body{font-family:'Montserrat',sans-serif;background:#0a0a0f;color:#fff}
:root{
  --gold:#fdb92a;
  --cyan:#33e4e0;
  --dark:#0a0a0f;
}

/* ═══ NAV ═══ */
nav{
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(10,10,15,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.nav-logo{
  font-family:'Reenie Beanie',cursive;
  font-size:2.2rem;font-weight:400;
  color:#fff;text-decoration:none;
  letter-spacing:0.02em;
  transition:color .2s;
}
.nav-logo:hover{color:var(--gold)}

.nav-right{display:flex;align-items:center;gap:14px}

.btn-sub{
  background:var(--gold);color:#000;
  font-family:'Montserrat',sans-serif;font-weight:700;
  font-size:0.75rem;letter-spacing:.18em;
  padding:9px 28px;
  border:2px solid transparent;
  cursor:pointer;text-decoration:none;display:inline-block;
  text-transform:uppercase;
  transition:background 0.4s ease, border-color 0.4s ease, color 0.4s ease;
}
.btn-sub:hover{background:transparent;border-color:var(--gold);color:var(--gold)}

.btn-back{
  font-family:'Montserrat',sans-serif;
  font-weight:400;font-size:0.72rem;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.5);text-decoration:none;
  transition:color .2s;
}
.btn-back:hover{color:#fff}

/* ═══ HERO ═══ */
.contact-hero{
  position:relative;
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  overflow:hidden;
  padding-top:80px;
}

@media(max-width:768px){
  .contact-hero{grid-template-columns:1fr}
}

/* Left – photo side */
.hero-photo{
  position:relative;
  overflow:hidden;
  min-height:500px;
}

.hero-photo img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  filter:grayscale(20%);
}

.hero-photo-placeholder{
  width:100%;height:100%;
  background:linear-gradient(135deg,#111 0%,#1a1a2e 100%);
  display:flex;align-items:center;justify-content:center;
  min-height:500px;
}

.hero-photo-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to right, transparent 60%, rgba(10,10,15,1) 100%);
}

/* Right – text side */
.hero-text{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px 60px 60px 40px;
  position:relative;
  z-index:2;
}

@media(max-width:768px){
  .hero-text{padding:40px 24px}
}

.hero-connect{
  font-family:'Montserrat',sans-serif;
  font-weight:300;
  font-size:clamp(1.2rem,3vw,2rem);
  letter-spacing:0.05em;
  color:rgba(255,255,255,0.8);
  margin-bottom:4px;
  animation:fadeUp 0.6s ease both;
}

.hero-name{
  font-family:'Antonio',sans-serif;
  font-weight:700;
  font-size:clamp(4rem,12vw,9rem);
  letter-spacing:-0.04em;
  line-height:0.85;
  color:#fff;
  text-transform:uppercase;
  animation:fadeUp 0.6s 0.1s ease both;
}

.hero-desc{
  font-size:0.85rem;
  font-weight:300;
  color:rgba(255,255,255,0.55);
  line-height:1.7;
  margin-top:20px;
  max-width:380px;
  animation:fadeUp 0.6s 0.2s ease both;
}

/* ═══ INQUIRY BUTTONS ═══ */
.inquiry-section{
  background:#0a0a0f;
  padding:60px 40px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  max-width:900px;
  margin:0 auto;
  width:100%;
}

@media(max-width:600px){
  .inquiry-section{grid-template-columns:1fr;padding:40px 24px}
}

.inquiry-btn{
  font-family:'Montserrat',sans-serif;
  font-weight:600;
  font-size:0.72rem;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#fff;
  background:none;
  border:1px solid rgba(255,255,255,0.25);
  padding:18px 24px;
  cursor:pointer;
  text-align:left;
  position:relative;
  transition:border-color .25s, color .25s, background .25s;
  display:flex;
  align-items:center;
  gap:10px;
}

.inquiry-btn::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:transparent;
  transition:background .25s;
}

.inquiry-btn:hover,
.inquiry-btn.active{
  border-color:var(--cyan);
  color:var(--cyan);
  background:rgba(51,228,224,0.05);
}

.inquiry-btn:hover::before,
.inquiry-btn.active::before{
  background:var(--cyan);
}

/* ═══ FORM SECTION ═══ */
.form-section{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
 margin:100px auto 80px;
  max-width:900px;
  width:calc(100% - 80px);
  padding:48px;
}

@media(max-width:768px){
  .form-section{width:calc(100% - 48px);padding:32px 24px}
}

.form-intro{
  font-size:0.8rem;
  font-weight:300;
  color:rgba(255,255,255,0.95);
  line-height:1.7;
  margin-bottom:36px;
  text-align:center;
  letter-spacing:0.5px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
}

.form-field{
  position:relative;
}

.form-field.full{
  grid-column:1/-1;
}

.form-input{
  width:100%;
  padding:14px 16px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;
  font-family:'Montserrat',sans-serif;
  font-size:0.72rem;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  outline:none;
  transition:border-color .2s, background .2s;
}

.form-input::placeholder{
  color:rgba(255,255,255,0.25);
  letter-spacing:2px;
}

.form-input:focus{
  border-color:var(--cyan);
  background:rgba(51,228,224,0.04);
}

textarea.form-input{
  min-height:160px;
  resize:vertical;
  text-transform:none;
  letter-spacing:0.5px;
  font-size:0.8rem;
}

.form-submit{
  margin-top:24px;
  text-align:center;
}

.btn-send{
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  font-size:0.78rem;
  letter-spacing:3px;
  text-transform:uppercase;
  background:var(--gold);
  color:#000;
  border:2px solid transparent;
  padding:16px 60px;
  cursor:pointer;
  transition:background 0.4s ease, border-color 0.4s ease, color 0.4s ease, transform 0.15s;
}
.btn-send:hover{
  background:transparent;
  border-color:var(--gold);
  color:var(--gold);
  transform:scale(1.02);
}

/* ═══ SUCCESS MESSAGE ═══ */
.success-msg{
  display:none;
  text-align:center;
  padding:48px 24px;
  animation:fadeUp 0.5s ease both;
}
.success-msg.show{display:block}
.success-icon{font-size:3rem;margin-bottom:16px}
.success-title{
  font-family:'Antonio',sans-serif;
  font-size:2.5rem;
  letter-spacing:0.05em;
  color:var(--cyan);
  margin-bottom:12px;
}
.success-text{
  font-size:0.85rem;
  font-weight:300;
  color:rgba(255,255,255,0.5);
}

/* ═══ SOCIAL STRIP ═══ */
.social-strip{
  border-top:1px solid rgba(255,255,255,0.06);
  padding:40px 24px;
  text-align:center;
}

.social-strip p{
  font-size:0.68rem;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.3);
  margin-bottom:20px;
}

.social-icons{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
}

.social-icon{
  display:flex;align-items:center;justify-content:center;
  width:40px;height:40px;
  border:1px solid rgba(255,255,255,0.12);
  text-decoration:none;
  transition:border-color .2s, transform .2s;
}
.social-icon:hover{border-color:var(--gold);transform:scale(1.1)}
.social-icon svg{width:18px;height:18px;fill:#fff}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">Aurelia Iwanow</a>
  <div class="nav-right">
    <a href="index.html" class="btn-back">← Strona główna</a>
    <a href="#" class="btn-sub" onclick="return false">SUBSKRYBUJ</a>
  </div>
</nav>

<!-- FORM -->
<div class="form-section">
<p class="form-intro">Jeśli masz pytania, czekam na wiadomość od Ciebie!</p>

<form id="contactForm" action="https://formspree.io/f/xdajwdla" method="POST">
  
    <div class="form-grid">
      <div class="form-field">
        <input type="text" name="imie" class="form-input" placeholder="Imię" required autocomplete="given-name"/>
      </div>
      <div class="form-field">
        <input type="text" name="nazwisko" class="form-input" placeholder="Nazwisko" autocomplete="family-name"/>
      </div>
      <div class="form-field">
        <input type="email" name="email" class="form-input" placeholder="Adres e-mail" required autocomplete="email"/>
      </div>
      <div class="form-field">
        <input type="text" name="temat" class="form-input" placeholder="Temat"/>
      </div>
      <div class="form-field full">
        <textarea name="wiadomosc" class="form-input" placeholder="Twoja wiadomość..." required></textarea>
      </div>
    </div>

    <div class="form-submit">
      <button type="submit" class="btn-send">WYŚLIJ WIADOMOŚĆ</button>
    </div>
  </form>
  <div class="success-msg" id="successMsg">
    <div class="success-icon">✅</div>
    <p class="success-title">WIADOMOŚĆ WYSŁANA!</p>
    <p class="success-text">Dziękuję za kontakt. Odezwę się wkrótce!</p>
  </div>
</div>
